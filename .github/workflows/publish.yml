name: Publish site

# Auto-deploy on push is DISABLED while GitHub Actions is blocked (account billing).
# Until then, publish locally with `./tools/publish.sh` (pushes to the gh-pages branch).
# Once Actions is unblocked: re-add `push: { branches: [main] }` here and switch
# Pages source back to "GitHub Actions".
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # NOTE: add R / r-lib setup here once a chapter contains executable R chunks.

      - name: Build book + slide decks
        run: ./tools/build.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _book

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
